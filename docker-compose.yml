services:
  app:
    build:
      context: .
    container_name: wm-distribuidora-api
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: wm-distribuidora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wm_distribuidora}
      POSTGRES_USER: ${POSTGRES_USER:-wm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wm_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-wm_user} -d ${POSTGRES_DB:-wm_distribuidora}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: ./admin
    container_name: wm-distribuidora-admin
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped

  storefront:
    build:
      context: ./storefront
    container_name: wm-distribuidora-storefront
    ports:
      - "3001:3001"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
